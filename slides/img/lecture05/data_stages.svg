<svg width="1200" height="470" xmlns="http://www.w3.org/2000/svg" font-family="Fira Sans, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666" />
    </marker>
  </defs>

  <!-- Circles -->
  <circle cx="180" cy="260" r="140" fill="#3b82f6" opacity="0.8" />
  <circle cx="480" cy="260" r="55" fill="#10b981" opacity="0.8" />
  <circle cx="700" cy="260" r="55" fill="#f59e0b" opacity="0.8" />
  <circle cx="910" cy="260" r="35" fill="#ef4444" opacity="0.8" />
  <circle cx="1100" cy="260" r="15" fill="#8b5cf6" opacity="0.8" />

  <!-- Arrows -->
  <line x1="335" y1="260" x2="405" y2="260" stroke="#666" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="550" y1="260" x2="635" y2="260" stroke="#666" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="760" y1="260" x2="855" y2="260" stroke="#666" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="960" y1="260" x2="1055" y2="260" stroke="#666" stroke-width="4" marker-end="url(#arrow)" />

  <!-- Text Styles -->
  <style>
    .stage { font-size: 24px; font-weight: bold; text-anchor: middle; fill: #333; }
    .scale { font-size: 18px; text-anchor: middle; fill: #555; }
    .desc { font-size: 20px; text-anchor: middle; fill: #222; }
    .desc-inside { font-size: 22px; text-anchor: middle; fill: #fff; font-weight: 500; }
  </style>

  <!-- Labels: Stage and Scale -->
  <text x="180" y="430" class="stage">Pretraining</text>
  <text x="180" y="455" class="scale">Trillions of tokens</text>
  
  <text x="480" y="430" class="stage">Instruction tuning</text>
  <text x="480" y="455" class="scale">10k-1M examples</text>

  <text x="700" y="430" class="stage">Preference tuning</text>
  <text x="700" y="455" class="scale">10k-1M examples</text>

  <text x="910" y="430" class="stage">Task finetuning</text>
  <text x="910" y="455" class="scale">1k-100k examples</text>

  <text x="1100" y="430" class="stage">Evaluation</text>
  <text x="1100" y="455" class="scale">100-10k examples</text>

  <!-- Descriptions -->
  <text x="180" y="60" class="desc">Raw text</text>
  <text x="180" y="85" class="desc" font-size="18px">(web, books, code, ...)</text>
  <path d="M 180 95 L 180 115" stroke="#666" stroke-width="2" stroke-dasharray="4" />

  <text x="480" y="60" class="desc">Instruction +</text>
  <text x="480" y="85" class="desc">desired output</text>
  <path d="M 480 95 L 480 200" stroke="#666" stroke-width="2" stroke-dasharray="4" />

  <text x="700" y="60" class="desc">Multiple outputs</text>
  <text x="700" y="85" class="desc">+ preference</text>
  <path d="M 700 95 L 700 210" stroke="#666" stroke-width="2" stroke-dasharray="4" />

  <text x="910" y="60" class="desc">Task-specific</text>
  <text x="910" y="85" class="desc">input-output pairs</text>
  <path d="M 910 95 L 910 220" stroke="#666" stroke-width="2" stroke-dasharray="4" />

  <text x="1100" y="60" class="desc">Inputs + gold</text>
  <text x="1100" y="85" class="desc">labels / references</text>
  <path d="M 1100 95 L 1100 230" stroke="#666" stroke-width="2" stroke-dasharray="4" />

</svg>